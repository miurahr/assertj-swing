when:
  - event: pull_request
    repo: miurahr/assertj-swing
  - event: tag
    ref: refs/tags/v*
  - event: push
    branch: main

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 1
      lfs: false
      tags: true

variables:
  pre_cmds: &pre_cmds
    - apk add --no-cache xvfb xvfb-run libsm-dev libxrender libxext-dev libxtst-dev libxcb-dev ttf-dejavu font-xfree86-type1 font-sun-misc fluxbox

steps:
  - name: assertj-swing-junit
    image: adoptopenjdk/openjdk11:alpine
    environment:
      GRADLE_USER_HOME: ${CI_WORKSPACE}/ci
    commands:
      - <<: *pre_cmds
      - ./gradlew --no-daemon -PenvIsCi=true fest-reflect:check assertj-swing-junit:check
  - name: assertj-swing-junit-jupiter
    image: adoptopenjdk/openjdk11:alpine
    environment:
      GRADLE_USER_HOME: ${CI_WORKSPACE}/ci
    commands:
      - <<: *pre_cmds
      - ./gradlew --no-daemon -PenvIsCi=true assertj-swing-junit-jupiter:check
  - name: assertj-swing
    image: adoptopenjdk/openjdk11:alpine
    environment:
      GRADLE_USER_HOME: ${CI_WORKSPACE}/ci
    commands:
      - <<: *pre_cmds
      - ./gradlew --no-daemon --scan -PenvIsCi=true -Dscan.uploadInBackground=false assertj-swing:check
