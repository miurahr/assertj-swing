when:
  - event: pull_request
    repo: miurahr/assertj-swing
  - event: tag
    ref: refs/tags/v*
  - event: push
    branch: main

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 1
      lfs: false
      tags: true

steps:
  build:
    image: adoptopenjdk/openjdk11:alpine
    commands:
      - apk add --no-cache xvfb xvfb-run libsm-dev libxrender libxext-dev libxtst-dev libxcb-dev ttf-dejavu font-xfree86-type1 font-sun-misc fluxbox
      - export DISPLAY=:99
      - Xvfb :99 -screen 0 1024x768x24 &
      - fluxbox &
      - ./gradlew --no-daemon --scan -PenvIsCi=true -Dscan.uploadInBackground=false clean fest-reflect:check assertj-swing-junit:check assertj-swing-junit-jupiter:check check
      - killall Xvfb