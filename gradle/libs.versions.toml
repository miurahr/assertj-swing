[versions]
junit = "4.13.2"
jupiter = "5.8.2"
assertj = "3.25.3"
commons_codec = "1.13"
commons_io = "2.16.1"
ant_junit = "1.10.14"
guice = "7.0.0"
testng = "6.14.3"
easymock = "3.5.1"
mockito = "2.28.2"
multithreadedtc = "1.0.3-SNAPSHOT"
equals_verifier = "2.5.2"
cglib = "3.3.0"
jetbrains_annotations = "23.0.0"

[libraries]
junit4 = {group = "junit", name = "junit", version.ref = "junit"}
jupiter = {group = "org.junit.jupiter", name = "junit-jupiter", version.ref = "jupiter"}
jupiter-engine = {group = "org.junit.jupiter", name = "junit-jupiter-engine", version.ref = "jupiter"}
assertj = {group = "org.assertj", name = "assertj-core", version.ref = "assertj"}
commons-codec = {group = "commons-codec", name = "commons-codec",  version.ref = "commons_codec"}
commons-io = {group = "commons-io", name = "commons-io", version.ref = "commons_io"}
ant-junit = {group = "org.apache.ant", name ="ant-junit", version.ref = "ant_junit"}
guice = {group = "com.google.inject", name = "guice", version.ref = "guice"}
testng = {group = "org.testng", name = "testng", version.ref = "testng"}
easymock = {group = "org.easymock", name = "easymock", version.ref = "easymock"}
mockito = {group = "org.mockito", name = "mockito-core", version.ref = "mockito"}
multithreadedtc = {group = "tokyo.northside", name = "multithreadedtc-junit4", version.ref = "multithreadedtc"}
equals-verifier = {group = "nl.jqno.equalsverifier", name = "equalsverifier", version.ref = "equals_verifier"}
cglib = {group = "cglib", name = "cglib", version.ref = "cglib"}
annotations = {module="org.jetbrains:annotations", version.ref = "jetbrains_annotations"}

[plugins]
nexus-publish = {id = "io.github.gradle-nexus.publish-plugin", version = "2.0.0"}
spotbugs = {id = "com.github.spotbugs", version = "6.0.9"}
spotless = {id = "com.diffplug.spotless", version = "6.25.0"}
