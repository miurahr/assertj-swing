site_name: AssertJ Swing test framework
repo_url: https://github.com/miurahr/assertj-swing
docs_dir: docs

nav:
  - Table of Contents: 'index.md'
  - Overview: 'assertj-swing.md'
  - Quick Start: 'assertj-swing-quick-start.md'
  - Getting Started: 'assertj-swing-getting-started.md'
  - Basics: 'assertj-swing-basics.md'
  - EDT: 'assertj-swing-edt.md'
  - Component lookup: 'assertj-swing-lookup.md'
  - Launching: 'assertj-swing-launch.md'
  - Input simulation: 'assertj-swing-input.md'
  - Running tests: 'assertj-swing-running.md'
  - Troubleshooting: 'assertj-swing-troubleshooting.md'
  - Advanced features: 'assertj-swing-advanced.md'

plugins:
  - glightbox

theme:
  name: material
  features:
  - navigation.tracking
  - navigation.top
  - content.code.copy
  palette:
    primary: amber

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
